name: Machine Learning CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install MLflow & Dependencies
      run: |
        pip install mlflow==2.19.0 dagshub pandas scikit-learn numpy

    - name: Run MLflow Project (Re-training)
      env:
        MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
        MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      run: |
        mkdir -p preprocessing/diabetes_dataset
        echo "Pregnancies,Glucose,BloodPressure,SkinThickness,Insulin,BMI,DiabetesPedigreeFunction,Age,Outcome" > preprocessing/diabetes_dataset/diabetes_train.csv
        echo "6,148,72,35,0,33.6,0.627,50,1" >> preprocessing/diabetes_dataset/diabetes_train.csv
        cp preprocessing/diabetes_dataset/diabetes_train.csv preprocessing/diabetes_dataset/diabetes_test.csv

        mlflow run .

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      run: |
        # Mendapatkan Run ID terbaru dari eksperimen yang baru saja berjalan
        LATEST_RUN=$(python -c "import mlflow; mlflow.set_tracking_uri('https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_Erlangga.mlflow'); exp = mlflow.get_experiment_by_name('Diabetes_Baseline_Erlangga'); runs = mlflow.search_runs(experiment_ids=[exp.experiment_id], order_by=['attributes.start_time DESC']); print(runs.iloc[0]['run_id'])")

        # Target Advance: Membuat Docker Image dari model dan push ke Docker Hub
        mlflow models build-docker -m "runs:/$LATEST_RUN/model" -n "${{ secrets.DOCKERHUB_USERNAME }}/diabetes-model:latest"
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/diabetes-model:latest